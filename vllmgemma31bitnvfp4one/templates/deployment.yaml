---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vllm-gemma31b-nvfp4-env
  namespace: "{{ .Release.Namespace }}"
data:
  MAX_MODEL_LEN: "1024"
  GPU_MEMORY_UTILIZATION: "0.8"
  MAX_NUM_SEQS: "1"
  MAX_NUM_BATCHED_TOKENS: "256"
  CPU_OFFLOAD_GB: "16"
  MODEL_NAME: "nvidia/Gemma-4-31B-IT-NVFP4"
  MODEL_ALIAS: "gemma-4-31b-it-nvfp4"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: vllmgemma31bitnvfp4one
  name: vllmgemma31bitnvfp4one
  namespace: "{{ .Release.Namespace }}"
  annotations:
    applications.app.bytetrade.io/gpu-inject: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: vllmgemma31bitnvfp4one
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: vllmgemma31bitnvfp4one
    spec:
      containers:
        - name: vllm-server
          image: "vllm/vllm-openai:cu130-nightly"
          command:
            - "sh"
            - "-c"
            - |
              pip install --quiet --upgrade \
                --pre transformers \
                soundfile soxr audioread lazy_loader msgpack decorator pooch av resampy scipy && \
              exec vllm serve "$@"
            - "--"
          args:
            - "$(MODEL_NAME)"
            - "--quantization"
            - "modelopt"
            - "--served-model-name"
            - "$(MODEL_ALIAS)"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
            - "--max-model-len"
            - "$(MAX_MODEL_LEN)"
            - "--gpu-memory-utilization"
            - "$(GPU_MEMORY_UTILIZATION)"
            - "--max-num-seqs"
            - "$(MAX_NUM_SEQS)"
            - "--max-num-batched-tokens"
            - "$(MAX_NUM_BATCHED_TOKENS)"
            - "--cpu-offload-gb"
            - "$(CPU_OFFLOAD_GB)"
            - "--dtype"
            - "auto"
            - "--trust-remote-code"
            - "--download-dir"
            - "/models"
            - "--enable-prefix-caching"
          envFrom:
            - configMapRef:
                name: vllm-gemma31b-nvfp4-env
          env:
            - name: HF_HOME
              value: "/models/huggingface"
            - name: PYTORCH_CUDA_ALLOC_CONF
              value: "expandable_segments:True"
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
              scheme: HTTP
            initialDelaySeconds: 120
            timeoutSeconds: 10
            periodSeconds: 30
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /health
              port: 8000
              scheme: HTTP
            initialDelaySeconds: 60
            timeoutSeconds: 10
            periodSeconds: 15
            failureThreshold: 600
          resources:
            limits:
              cpu: "16"
              memory: 50Gi
            requests:
              cpu: 4000m
              memory: 24Gi
          volumeMounts:
            - mountPath: "/models"
              name: models
      volumes:
        - name: models
          hostPath:
            path: "{{ .Values.userspace.appData }}/models"
            type: DirectoryOrCreate
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  labels:
    io.kompose.service: vllmgemma31bitnvfp4one
  name: vllmgemma31bitnvfp4one
  namespace: "{{ .Release.Namespace }}"
spec:
  ports:
    - name: "vllm"
      port: 8000
      targetPort: 8000
  selector:
    io.kompose.service: vllmgemma31bitnvfp4one
