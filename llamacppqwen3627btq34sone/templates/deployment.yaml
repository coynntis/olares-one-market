---
apiVersion: v1
kind: ConfigMap
metadata:
  name: llamacpp-qwen36-tq34s-env
  namespace: "{{ .Release.Namespace }}"
data:
  MODEL_URL: "https://huggingface.co/YTan2000/Qwen3.6-27B-TQ3_4S/resolve/main/Qwen3.6-27B-TQ3_4S.gguf"
  MODEL_FILE: "Qwen3.6-27B-TQ3_4S.gguf"
  MMPROJ_URL: "https://huggingface.co/YTan2000/Qwen3.6-27B-TQ3_4S/resolve/main/mmproj.gguf"
  MMPROJ_FILE: "mmproj.gguf"
  CHAT_TEMPLATE_URL: "https://huggingface.co/YTan2000/Qwen3.6-27B-TQ3_4S/resolve/main/chat_template.jinja"
  CHAT_TEMPLATE_FILE: "chat_template.jinja"
  MODEL_ALIAS: "qwen3.6-27b-tq3-4s"
  CONTEXT_SIZE: "32768"
  N_GPU_LAYERS: "99"
  THREADS: "16"
  BUILD_JOBS: "8"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: llamacppqwen3627btq34sone
  name: llamacppqwen3627btq34sone
  namespace: "{{ .Release.Namespace }}"
  annotations:
    applications.app.bytetrade.io/gpu-inject: "true"
    applications.app.bytetrade.io/required_gpu: "1"

spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: llamacppqwen3627btq34sone
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: llamacppqwen3627btq34sone
    spec:
      initContainers:
        - name: model-downloader
          image: "docker.io/alpine:3.20"
          command:
            - sh
            - "-c"
            - |
              set -eu

              MODEL_PATH="/models/${MODEL_FILE}"
              MMPROJ_PATH="/models/${MMPROJ_FILE}"
              TEMPLATE_PATH="/models/${CHAT_TEMPLATE_FILE}"

              if [ -f "$MODEL_PATH" ]; then
                echo "Model already present: $MODEL_PATH"
                ls -lh "$MODEL_PATH"
              else
                echo "Downloading model from $MODEL_URL ..."
                wget -O "$MODEL_PATH.tmp" "$MODEL_URL"
                mv "$MODEL_PATH.tmp" "$MODEL_PATH"
              fi

              if [ -f "$MMPROJ_PATH" ]; then
                echo "mmproj already present: $MMPROJ_PATH"
                ls -lh "$MMPROJ_PATH"
              else
                echo "Downloading mmproj from $MMPROJ_URL ..."
                wget -O "$MMPROJ_PATH.tmp" "$MMPROJ_URL"
                mv "$MMPROJ_PATH.tmp" "$MMPROJ_PATH"
              fi

              if [ -f "$TEMPLATE_PATH" ]; then
                echo "Chat template already present: $TEMPLATE_PATH"
              else
                echo "Downloading chat template from $CHAT_TEMPLATE_URL ..."
                wget -O "$TEMPLATE_PATH.tmp" "$CHAT_TEMPLATE_URL"
                mv "$TEMPLATE_PATH.tmp" "$TEMPLATE_PATH"
              fi

              echo "Download stage complete."
              ls -lh "$MODEL_PATH" "$MMPROJ_PATH" "$TEMPLATE_PATH"
          envFrom:
            - configMapRef:
                name: llamacpp-qwen36-tq34s-env
          resources:
            limits:
              cpu: "2"
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - mountPath: "/models"
              name: models
      containers:
        - name: llamacpp-server
          image: "nvidia/cuda:13.1.0-devel-ubuntu24.04"
          command:
            - "sh"
            - "-c"
            - |
              set -eux
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y --no-install-recommends git cmake build-essential ca-certificates
              rm -rf /var/lib/apt/lists/*

              mkdir -p /workspace
              REPO_DIR="/workspace/llama.cpp-tq3"
              REPO_URL="https://github.com/turbo-tan/llama.cpp-tq3"

              if [ -d "$REPO_DIR/.git" ]; then
                echo "Repo already exists at $REPO_DIR, updating"
                git -C "$REPO_DIR" remote set-url origin "$REPO_URL" || true
                git -C "$REPO_DIR" fetch --tags --prune origin || true
                git -C "$REPO_DIR" pull --ff-only || true
              elif [ -e "$REPO_DIR" ]; then
                echo "Path exists but is not a git repo: $REPO_DIR"
                ts="$(date +%Y%m%d%H%M%S)"
                mv "$REPO_DIR" "${REPO_DIR}.bak.${ts}"
                git clone "$REPO_URL" "$REPO_DIR"
              else
                echo "Cloning llama.cpp-tq3 into $REPO_DIR"
                git clone "$REPO_URL" "$REPO_DIR"
              fi

              cd "$REPO_DIR"
              cmake -B build -DGGML_CUDA=ON
              cmake --build build -j"${BUILD_JOBS}" --verbose

              exec ./build/bin/llama-server \
                --host 0.0.0.0 \
                --port 8080 \
                --model "/models/${MODEL_FILE}" \
                --mmproj "/models/${MMPROJ_FILE}" \
                --chat-template-file "/models/${CHAT_TEMPLATE_FILE}" \
                --jinja \
                --alias "${MODEL_ALIAS}" \
                --ctx-size "${CONTEXT_SIZE}" \
                --n-gpu-layers "${N_GPU_LAYERS}" \
                --threads "${THREADS}" \
                --cache-type-k q4_0 \
                --cache-type-v tq3_0 \
                --flash-attn auto \
                --parallel 1
          env:
            - name: GGML_CUDA_GRAPH_OPT
              value: "1"
          envFrom:
            - configMapRef:
                name: llamacpp-qwen36-tq34s-env
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 60
            timeoutSeconds: 10
            periodSeconds: 30
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /health
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 10
            timeoutSeconds: 5
            periodSeconds: 10
            failureThreshold: 3600
          resources:
            limits:
              cpu: "16"
              memory: 40Gi
            requests:
              cpu: 4000m
              memory: 12Gi
          volumeMounts:
            - mountPath: "/models"
              name: models
            - mountPath: "/workspace"
              name: workspace
      volumes:
        - name: models
          hostPath:
            path: "{{ .Values.userspace.appData }}/models"
            type: DirectoryOrCreate
        - name: workspace
          hostPath:
            path: "{{ .Values.userspace.appData }}/llamacppqwen3627btq34sone-workspace"
            type: DirectoryOrCreate
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  labels:
    io.kompose.service: llamacppqwen3627btq34sone
  name: llamacppqwen3627btq34sone
  namespace: "{{ .Release.Namespace }}"
spec:
  ports:
    - name: "llamacpp"
      port: 8080
      targetPort: 8080
  selector:
    io.kompose.service: llamacppqwen3627btq34sone
